# SPDX-License-Identifier: Apache-2.0
# CI for ncz-os/mnemos-ic-runtime — ARGOS self-hosted shell runner
#
# Runner: ARGOS (192.168.207.22) — Docker 29 + buildx 0.30, shell executor.
# No Docker-in-Docker needed; jobs run directly on the ARGOS host shell.
#
# Requires GitLab CI/CD variables (Settings → CI/CD → Variables):
#   GHCR_USER  — github username (perlowja)
#   GHCR_PAT   — GitHub PAT with write:packages scope (masked + protected)

stages:
  - lint
  - build
  - manifest
  - publish-record

variables:
  REGISTRY: ghcr.io
  IMAGE_NAME: argonautsystems/ic-engine
  DOCKER_BUILDKIT: "1"

# ── Lint ──────────────────────────────────────────────────────────────────
# Shell executor: run hadolint via docker on the host (no image: needed).
lint:dockerfile:
  stage: lint
  tags: [argos, ncz-os]
  script:
    - docker run --rm -i hadolint/hadolint:latest < Dockerfile || true
  allow_failure: true
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

lint:compose:
  stage: lint
  tags: [argos, ncz-os]
  script:
    - docker compose -f compose.yml config --quiet
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ── Build ─────────────────────────────────────────────────────────────────
# Shell executor on ARGOS: docker buildx is available on host.
# Buildx builder named "multiarch" is pre-created on ARGOS with QEMU support.
# If it doesn't exist the before_script creates it once.

.build-common: &build-common
  stage: build
  tags: [argos, ncz-os]
  before_script:
    - echo "$GHCR_PAT" | docker login $REGISTRY -u "$GHCR_USER" --password-stdin
    - docker buildx inspect multiarch > /dev/null 2>&1 ||
        (docker run --privileged --rm tonistiigi/binfmt --install all &&
         docker buildx create --name multiarch --driver docker-container --use &&
         docker buildx inspect --bootstrap)
    - docker buildx use multiarch
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

build:amd64:
  <<: *build-common
  script:
    - export VERSION="${CI_COMMIT_TAG#v}"
    - |
      docker buildx build \
        --platform linux/amd64 \
        --build-arg GITLAB_TOKEN="${GITLAB_READ_PAT}" \
        --tag $REGISTRY/$IMAGE_NAME:${VERSION}-cpu-amd64 \
        --provenance=false \
        --push \
        .
    - echo "Pushed $REGISTRY/$IMAGE_NAME:${VERSION}-cpu-amd64"

build:arm64:
  <<: *build-common
  timeout: 90m
  script:
    - export VERSION="${CI_COMMIT_TAG#v}"
    - |
      docker buildx build \
        --platform linux/arm64 \
        --build-arg GITLAB_TOKEN="${GITLAB_READ_PAT}" \
        --tag $REGISTRY/$IMAGE_NAME:${VERSION}-cpu-arm64 \
        --provenance=false \
        --push \
        .
    - echo "Pushed $REGISTRY/$IMAGE_NAME:${VERSION}-cpu-arm64"

# ── Manifest ──────────────────────────────────────────────────────────────

manifest:multi-arch:
  stage: manifest
  tags: [argos, ncz-os]
  needs: [build:amd64, build:arm64]
  before_script:
    - echo "$GHCR_PAT" | docker login $REGISTRY -u "$GHCR_USER" --password-stdin
  script:
    - export VERSION="${CI_COMMIT_TAG#v}"
    # Remove any stale local manifest
    - docker manifest rm $REGISTRY/$IMAGE_NAME:${VERSION}-cpu 2>/dev/null || true
    - |
      docker manifest create $REGISTRY/$IMAGE_NAME:${VERSION}-cpu \
        $REGISTRY/$IMAGE_NAME:${VERSION}-cpu-amd64 \
        $REGISTRY/$IMAGE_NAME:${VERSION}-cpu-arm64
    - |
      docker manifest annotate $REGISTRY/$IMAGE_NAME:${VERSION}-cpu \
        $REGISTRY/$IMAGE_NAME:${VERSION}-cpu-amd64 --os linux --arch amd64
    - |
      docker manifest annotate $REGISTRY/$IMAGE_NAME:${VERSION}-cpu \
        $REGISTRY/$IMAGE_NAME:${VERSION}-cpu-arm64 --os linux --arch arm64 --variant v8
    - docker manifest push --purge $REGISTRY/$IMAGE_NAME:${VERSION}-cpu
    # :latest
    - docker manifest rm $REGISTRY/$IMAGE_NAME:latest 2>/dev/null || true
    - |
      docker manifest create $REGISTRY/$IMAGE_NAME:latest \
        $REGISTRY/$IMAGE_NAME:${VERSION}-cpu-amd64 \
        $REGISTRY/$IMAGE_NAME:${VERSION}-cpu-arm64
    - |
      docker manifest annotate $REGISTRY/$IMAGE_NAME:latest \
        $REGISTRY/$IMAGE_NAME:${VERSION}-cpu-amd64 --os linux --arch amd64
    - |
      docker manifest annotate $REGISTRY/$IMAGE_NAME:latest \
        $REGISTRY/$IMAGE_NAME:${VERSION}-cpu-arm64 --os linux --arch arm64 --variant v8
    - docker manifest push --purge $REGISTRY/$IMAGE_NAME:latest
    - echo "MANIFEST_DIGEST=$(docker manifest inspect $REGISTRY/$IMAGE_NAME:${VERSION}-cpu --verbose | sha256sum | awk '{print $1}')" > manifest.env
    - cat manifest.env
  artifacts:
    reports:
      dotenv: manifest.env
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

# ── Publish record ────────────────────────────────────────────────────────

publish:release-summary:
  stage: publish-record
  tags: [argos, ncz-os]
  needs: [manifest:multi-arch]
  script:
    - export VERSION="${CI_COMMIT_TAG#v}"
    - |
      cat > release-summary.txt <<SUMMARY
      InvestorClaw v${VERSION} — $(date -u +%Y-%m-%dT%H:%M:%SZ)
      Pipeline: ${CI_PIPELINE_URL}
      Commit:   ${CI_COMMIT_SHA}

      Image (multi-arch manifest list):
        ${REGISTRY}/${IMAGE_NAME}:${VERSION}-cpu
        ${REGISTRY}/${IMAGE_NAME}:latest

      Per-arch tags:
        ${REGISTRY}/${IMAGE_NAME}:${VERSION}-cpu-amd64
        ${REGISTRY}/${IMAGE_NAME}:${VERSION}-cpu-arm64
      SUMMARY
    - cat release-summary.txt
  artifacts:
    paths: [release-summary.txt]
    expire_in: 1 year
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
