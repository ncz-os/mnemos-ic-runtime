# SPDX-License-Identifier: Apache-2.0
# CI for mnemos-os/mnemos-ic-runtime
#
# Triggers on tag push (vMAJOR.MINOR.PATCH). Builds amd64 + arm64 in parallel
# using docker buildx with QEMU emulation, pushes per-arch tags to ghcr.io,
# then creates the multi-arch manifest list at :VERSION-cpu and :latest.
#
# Eliminates the manual TYPHON + cixmini build dance done by hand for v4.1.34
# through v4.1.36 (mem_1778053746504_7ed7d4 captures the manual flow). Future
# v4.1.x and v4.2 tag pushes auto-publish multi-arch.
#
# Requires CI/CD variables:
#   GHCR_USER     — github username (e.g. perlowja)
#   GHCR_PAT      — github PAT with `write:packages` scope (masked + protected)
# Set under Settings → CI/CD → Variables on gitlab.com/mnemos-os/mnemos-ic-runtime

stages:
  - lint
  - build
  - manifest
  - publish-record

variables:
  REGISTRY: ghcr.io
  IMAGE_NAME: argonautsystems/ic-engine
  # Use buildkit for layer caching across runs; saves ~50% build time on
  # incremental tag bumps.
  DOCKER_BUILDKIT: "1"
  BUILDX_VERSION: "v0.18.0"

# Lint runs on every push; it's cheap and catches Dockerfile issues before
# the heavy build kicks in.
lint:dockerfile:
  stage: lint
  tags: [argos, mnemos-os]
  image: hadolint/hadolint:latest-alpine
  script:
    - hadolint Dockerfile
  allow_failure: true   # advisory; don't gate the release on lint warnings
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

lint:compose:
  stage: lint
  tags: [argos, mnemos-os]
  image: docker:27.3.1-cli
  script:
    - docker compose -f compose.yml config --quiet
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ────────────────────────────────────────────────────────────────────────
# Build stage — one job per arch, parallel
# ────────────────────────────────────────────────────────────────────────

.build-template: &build-template
  stage: build
  tags: [argos, mnemos-os]
  image: docker:27.3.1-cli
  services:
    - docker:27.3.1-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_HOST: tcp://docker:2376
    DOCKER_CERT_PATH: "/certs/client"
    DOCKER_TLS_VERIFY: "1"
  before_script:
    - apk add --no-cache curl bash
    - echo "$GHCR_PAT" | docker login $REGISTRY -u "$GHCR_USER" --password-stdin
    # Set up buildx with QEMU for cross-arch builds
    - docker run --privileged --rm tonistiigi/binfmt --install all
    - docker buildx create --name multiarch --use
    - docker buildx inspect --bootstrap
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

build:amd64:
  <<: *build-template
  variables:
    PLATFORM: linux/amd64
    ARCH_TAG: amd64
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_HOST: tcp://docker:2376
    DOCKER_CERT_PATH: "/certs/client"
    DOCKER_TLS_VERIFY: "1"
  script:
    - export VERSION="${CI_COMMIT_TAG#v}"
    - echo "Building $REGISTRY/$IMAGE_NAME:$VERSION-cpu-$ARCH_TAG"
    - >
      docker buildx build
      --platform $PLATFORM
      --tag $REGISTRY/$IMAGE_NAME:$VERSION-cpu-$ARCH_TAG
      --provenance=false
      --push
      .
    - echo "$REGISTRY/$IMAGE_NAME:$VERSION-cpu-$ARCH_TAG pushed"

build:arm64:
  <<: *build-template
  variables:
    PLATFORM: linux/arm64
    ARCH_TAG: arm64
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_HOST: tcp://docker:2376
    DOCKER_CERT_PATH: "/certs/client"
    DOCKER_TLS_VERIFY: "1"
  # arm64 via QEMU is ~3-4× slower than amd64 native; bump timeout
  timeout: 90m
  script:
    - export VERSION="${CI_COMMIT_TAG#v}"
    - echo "Building $REGISTRY/$IMAGE_NAME:$VERSION-cpu-$ARCH_TAG"
    - >
      docker buildx build
      --platform $PLATFORM
      --tag $REGISTRY/$IMAGE_NAME:$VERSION-cpu-$ARCH_TAG
      --provenance=false
      --push
      .
    - echo "$REGISTRY/$IMAGE_NAME:$VERSION-cpu-$ARCH_TAG pushed"

# ────────────────────────────────────────────────────────────────────────
# Manifest stage — combine the two arch images into a multi-arch list
# under :VERSION-cpu and :latest
# ────────────────────────────────────────────────────────────────────────

manifest:multi-arch:
  stage: manifest
  tags: [argos, mnemos-os]
  image: docker:27.3.1-cli
  services:
    - docker:27.3.1-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_HOST: tcp://docker:2376
    DOCKER_CERT_PATH: "/certs/client"
    DOCKER_TLS_VERIFY: "1"
  needs:
    - build:amd64
    - build:arm64
  before_script:
    - echo "$GHCR_PAT" | docker login $REGISTRY -u "$GHCR_USER" --password-stdin
    - mkdir -p ~/.docker
    - 'echo ''{"experimental": "enabled"}'' > ~/.docker/config.json && echo "$GHCR_PAT" | docker login $REGISTRY -u "$GHCR_USER" --password-stdin'
  script:
    - export VERSION="${CI_COMMIT_TAG#v}"
    - >
      docker manifest create
      $REGISTRY/$IMAGE_NAME:$VERSION-cpu
      $REGISTRY/$IMAGE_NAME:$VERSION-cpu-amd64
      $REGISTRY/$IMAGE_NAME:$VERSION-cpu-arm64
    - >
      docker manifest annotate
      $REGISTRY/$IMAGE_NAME:$VERSION-cpu
      $REGISTRY/$IMAGE_NAME:$VERSION-cpu-amd64
      --os linux --arch amd64
    - >
      docker manifest annotate
      $REGISTRY/$IMAGE_NAME:$VERSION-cpu
      $REGISTRY/$IMAGE_NAME:$VERSION-cpu-arm64
      --os linux --arch arm64 --variant v8
    - docker manifest push --purge $REGISTRY/$IMAGE_NAME:$VERSION-cpu
    # Also tag :latest pointing at the same manifest list
    - >
      docker manifest create
      $REGISTRY/$IMAGE_NAME:latest
      $REGISTRY/$IMAGE_NAME:$VERSION-cpu-amd64
      $REGISTRY/$IMAGE_NAME:$VERSION-cpu-arm64
    - >
      docker manifest annotate
      $REGISTRY/$IMAGE_NAME:latest
      $REGISTRY/$IMAGE_NAME:$VERSION-cpu-amd64
      --os linux --arch amd64
    - >
      docker manifest annotate
      $REGISTRY/$IMAGE_NAME:latest
      $REGISTRY/$IMAGE_NAME:$VERSION-cpu-arm64
      --os linux --arch arm64 --variant v8
    - docker manifest push --purge $REGISTRY/$IMAGE_NAME:latest
    # Capture the manifest list digest for downstream stages / artifacts
    - export MANIFEST_DIGEST=$(docker manifest inspect $REGISTRY/$IMAGE_NAME:$VERSION-cpu | sha256sum | awk '{print $1}')
    - echo "$VERSION-cpu manifest list pushed; per-arch + multi-arch tags ready"
    - echo "MANIFEST_DIGEST=$MANIFEST_DIGEST" > manifest.env
  artifacts:
    reports:
      dotenv: manifest.env
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

# ────────────────────────────────────────────────────────────────────────
# Publish-record stage — leaves a release-summary artifact
# ────────────────────────────────────────────────────────────────────────

publish:release-summary:
  stage: publish-record
  tags: [argos, mnemos-os]
  image: alpine:3.20
  needs:
    - manifest:multi-arch
  script:
    - export VERSION="${CI_COMMIT_TAG#v}"
    - |
      cat > release-summary.txt <<EOF
      # InvestorClaw v$VERSION release summary
      # Built: $(date -u +%Y-%m-%dT%H:%M:%SZ)
      # Pipeline: $CI_PIPELINE_URL
      # Commit: $CI_COMMIT_SHA

      Image (multi-arch manifest list):
        $REGISTRY/$IMAGE_NAME:$VERSION-cpu
        $REGISTRY/$IMAGE_NAME:latest

      Per-arch tags:
        $REGISTRY/$IMAGE_NAME:$VERSION-cpu-amd64
        $REGISTRY/$IMAGE_NAME:$VERSION-cpu-arm64

      Pull on any host:
        docker pull $REGISTRY/$IMAGE_NAME:$VERSION-cpu

      Pull pinned to platform:
        docker pull --platform linux/arm64 $REGISTRY/$IMAGE_NAME:$VERSION-cpu
      EOF
    - cat release-summary.txt
  artifacts:
    paths:
      - release-summary.txt
    expire_in: 1 year
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
