# SPDX-License-Identifier: MIT-0
# InvestorClaw v4.0 — dockerized-skill convention compose
# Spec: https://raw.githubusercontent.com/mnemos-os/mnemos-ic-runtime/v4.1.27/RFC.md
# Skill: https://raw.githubusercontent.com/mnemos-os/mnemos-ic-runtime/v4.1.27/SKILL.md

# x-* extension keys are ignored by Docker Compose itself (so this file
# runs cleanly with `docker compose up`), but install tools that
# implement the compose-x-mcp-services convention read these keys to
# wire the MCP server registration into the agent's config.

x-mcp-services:
  ic-engine:
    transport: streamable-http
    url: http://localhost:18090/mcp
    description: "Portfolio analysis (deterministic, FINOS CDM 5.x compliant)"
    health: http://localhost:18090/healthz

x-mcp-service-meta:
  spec: "compose-x-mcp-services/v1"
  version: "4.1.22"
  dashboard_url: http://localhost:18092/
  skill_url: https://raw.githubusercontent.com/mnemos-os/mnemos-ic-runtime/v4.1.27/SKILL.md
  required_keys: []
  optional_keys:
    - { name: TOGETHER_API_KEY, purpose: "narrative LLM (Together google/gemma-4-31B-it — serverless, ~100 tok/s, ~$0.0008/1k tokens). MiniMax-M2 moved off serverless tier 2026-05; pick a dedicated endpoint if you want it." }
    - { name: FINNHUB_KEY,      purpose: "real-time quotes" }
    - { name: NEWSAPI_KEY,      purpose: "news correlation" }
    - { name: ALPHA_VANTAGE_KEY, purpose: "backup quote provider" }
    - { name: FRED_API_KEY,     purpose: "FRED yield curve" }
    - { name: MASSIVE_API_KEY,  purpose: "backup quote provider" }
  preferred_agents: ["zeroclaw", "openclaw", "hermes", "claude-code"]
  supported_agents: ["any MCP client", "any HTTP/REST client"]

services:
  ic-engine:
    image: ghcr.io/argonautsystems/ic-engine:4.1.41-cpu
    container_name: ic-engine
    restart: unless-stopped

    # MCP-HTTP at :18090/mcp + plain REST at :18090/api/portfolio/*
    # Dashboard + healthz at :18092
    # Both bind to 127.0.0.1 by default per RFC §8 — set IC_HOST to
    # override (e.g., 0.0.0.0 for cross-host access; only do this behind
    # nginx/Tailscale/Caddy with TLS termination).
    ports:
      - "127.0.0.1:18090:8090"
      - "127.0.0.1:18092:8092"

    volumes:
      # Persistent data — engine cache, reports, optional /data/keys.env.
      - ic-engine-data:/data
      # Drop broker exports (CSV/XLS/PDF) here on the host:
      - ./portfolios:/data/portfolios

    environment:
      # Fleet default: Together google/gemma-4-31B-it (32k ctx, ~100 tok/s,
      # ~$0.0008/1k tokens — serverless tier). MiniMax-M2 is no longer
      # served on Together's serverless tier (requires a paid dedicated
      # endpoint as of 2026-05); gemma-4-31B-it is the cheapest serverless
      # model with strong-enough reasoning for portfolio narrative.
      # Engine works without these (degraded — stub narratives), but with
      # an LLM key it produces real natural-language answers.
      INVESTORCLAW_NARRATIVE_PROVIDER: openai_compat
      INVESTORCLAW_NARRATIVE_ENDPOINT: https://api.together.xyz/v1
      INVESTORCLAW_NARRATIVE_MODEL: google/gemma-4-31B-it
      # MNEMOS persistence for portfolio_ask responses. Override for your
      # deployment — typical values: http://mnemos:5002 (compose-internal),
      # http://localhost:5002 (host-side), or your own MNEMOS endpoint URL.
      # Leaving unset disables MNEMOS persistence (responses still return).
      MNEMOS_BASE: ${MNEMOS_BASE:-}
      # Boot-time auto-initialize: container runs setup -> refresh -> seed
      # ask 2s after listeners come up so the envelope cache is warm by
      # the time any agent connects. Set to "0" to disable.
      IC_INITIALIZE_ON_BOOT: "1"

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8090/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  ic-engine-data:
    name: ic-engine-data
